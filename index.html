<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

  <div class="card m-5">
    <div class="card-header">

      <h4>Payment form example</h4>
    </div>
    <div class="card-body">
      <div class="alert alert-danger" role="alert">
        Some fields are missing
      </div>

      <!--Inicio del contenedor 1-->

      <div class="container row">

        <!--col 1-->
        <div class="col-5"><label for="card"><strong>Card #</strong></label><br>
          <input type="password" id="card" class="form-control" placeholder="XXXXXXXXXXXXXX">
        </div>

        <!--col 2-->
        <div class="col-3"><label for="cvc"><strong>CVC #</strong></label><br>
          <input type="text" class="form-control" placeholder="0000" id="cvc">
        </div>

        <!--col 3-->
        <div class="col-md-4">
          <label for="amount" class="form-label"><strong>Amount</strong></label>
          <div class="d-flex align-items-center">
            <strong>$</strong><input type="text" class="form-control " id="amount" placeholder="Amount">
          </div>

        </div>
        <!--Fin del contenedor-->


        <!--Inicio Contenedor 2-->

        <!--col 1-->
        <div class="container2 row mb-2">

          <div class="col-6"><label for="first_name"><strong>First Name</strong></label>
            <br>
            <input type="text" id="first_name" class="form-control">
          </div>

          <!--col 2-->
          <div class="col-6"><label for="last_name"><strong>Last Name</strong></label>
            <br>
            <input type="text" id="last_name" class="form-control">
          </div>

        </div>


        <!--Fin Contenedor 2-->


        <!--Inicio Contenedor 3-->
        <div class="container3 row mb-2">

          <!--col 1-->
          <div class="col-6"><label for="city"><strong>City</strong></label>
            <br>
            <input type="text" id="city" cols="60" rows="1" class="form-control">
          </div>

          <!--col 2-->
          <div class="col-3"><label for="state"><strong>State</strong></label>
            <br>
            <select class="form-select" id="selectEstado" aria-label="Default select example">
              <option selected>Pick a state</option>
              <option value="1"> Estado 1</option>
              
            </select>
          </div>

          <!--col 3-->
          <div class="col-3"><label for="postal-code"><strong>Postal Code</strong></label>
            <br>
            <input type="text" id="postal-code" class="form-control">
          </div>

        </div>

        <!--Fin Contenedor 3-->

        <!--Inicio Contenedor 4-->
        <div class="container4 row mb-2">

          <!--col 1-->
          <div class="col-md-6">
  <label class="form-label"><strong>We accept:</strong></label>
  <div class="bg-secondary text-white p-2 rounded d-flex justify-content-between align-items-center shadow-sm" style="width: 250px;">
    
    <div class="form-check form-check-inline m-0">
      <input class="form-check-input" type="radio" name="pays" id="p1" checked>
      <label class="form-check-label" for="p1"><i class="fa-brands fa-cc-mastercard fa-lg"></i></label>
    </div>

    <div class="form-check form-check-inline m-0">
      <input class="form-check-input" type="radio" name="pays" id="p2">
      <label class="form-check-label" for="p2"><i class="fa-brands fa-cc-visa fa-lg"></i></label>
    </div>

    <div class="form-check form-check-inline m-0">
      <input class="form-check-input" type="radio" name="pays" id="p3">
      <label class="form-check-label" for="p3"><i class="fa-brands fa-cc-diners-club fa-lg"></i></label>
    </div>

    <div class="form-check form-check-inline m-0">
      <input class="form-check-input" type="radio" name="pays" id="p4">
      <label class="form-check-label" for="p4"><i class="fa-brands fa-cc-amex fa-lg"></i></label>
    </div>

  </div>
</div>
          <!--Fin Col 1-->

          <!--col 2-->
          <div class="col-6"><label for="msg"><strong>Message</strong></label>
            <br>
            <textarea id="msg" cols="60" rows="5" class="form-control"></textarea>
          </div>
          <!-- Fin Col 2-->
          <!--Fin Contenedor 4-->
          <br>
          <br>

        </div>
        
      </div>
      
    </div>
    <div class="card-footer d-flex justify-content-end gap-2">
          <a href="#" class="btn btn-secondary">Cancel</a>
          <a href="#" class="btn btn-primary">Send</a>
        </div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
</body>

</html>
